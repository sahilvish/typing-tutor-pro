<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vyapam Skill Test - Typing Tutor Pro</title>
    <style>
        /* ========================
           FONT DEFINITIONS
           ======================== */
        @font-face {
            font-family: "Kruti Dev 010";
            src: url("https://db.onlinewebfonts.com/t/20e2ce1c2b535d8e7c10b2a38260a9f5.woff2") format("woff2");
        }
        :root {
            --pinky-l: #ff9aa2; --ring-l: #ffb7b2; --mid-l: #ffdac1; --index-l: #e2f0cb; --thumb: #f5f5f5;
            --index-r: #b5ead7; --mid-r: #c7ceea; --ring-r: #e0cfe4; --pinky-r: #f3d1f4;
            --key-text: #495057; --key-shadow: #ced4da;
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --window-bg: rgba(255, 255, 255, 0.90); --text-main: #222;
        }
        body.dark-mode {
            --pinky-l: #6b2d33; --ring-l: #6b3e39; --mid-l: #6b5340; --index-l: #4c5e3d; --thumb: #333333;
            --index-r: #375e4e; --mid-r: #40455e; --ring-r: #5e4663; --pinky-r: #6b436c;
            --key-text: #e0e0e0; --key-shadow: #111111;
            --bg-gradient: linear-gradient(135deg, #121212 0%, #000000 100%);
            --window-bg: rgba(30, 30, 30, 0.85); --text-main: #eee;
        }
        body { margin: 0; padding: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg-gradient); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; user-select: none; transition: background 0.3s; }
        .mac-window { width: 950px; background: var(--window-bg); backdrop-filter: blur(20px); border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.4); overflow: hidden; display: flex; flex-direction: column; }
        .title-bar { height: 48px; background: rgba(235, 235, 235, 0.8); border-bottom: 1px solid rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: relative; }
        .options-container { display: flex; flex-direction: column; align-items: flex-start; cursor: pointer; padding: 4px 8px; margin-left: -8px; border-radius: 6px; transition: background 0.2s; }
        .options-container:hover { background: rgba(0,0,0,0.08); }
        .options-text { font-size: 11px; font-weight: 800; color: #222; margin-bottom: 4px; letter-spacing: 0.3px; }
        body.dark-mode .options-text { color: #ddd; }
        .traffic-lights { display: flex; gap: 6px; }
        .light { width: 12px; height: 12px; border-radius: 50%; }
        .red { background-color: #ff5f56; } .yellow { background-color: #ffbd2e; } .green { background-color: #27c93f; }
        .dropdown-menu { display: none; position: absolute; top: 48px; left: 10px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); padding: 12px 15px; z-index: 1000; flex-direction: column; gap: 12px; min-width: 180px; }
        .dropdown-menu.show { display: flex; }
        body.dark-mode .dropdown-menu { background: #2d2d2d; border-color: #444; }
        .menu-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .menu-item label { font-size: 13px; color: #555; font-weight: 500; }
        body.dark-mode .menu-item label { color: #bbb; }
        .menu-divider { border-top: 1px solid #eee; padding-top: 12px; }
        body.dark-mode .menu-divider { border-top-color: #444; }
        .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #339af0; }
        input:checked + .slider:before { transform: translateX(16px); }
        .window-title { position: absolute; left: 50%; transform: translateX(-50%); font-size: 13px; font-weight: 600; color: #4a4a4a; }
        body.dark-mode .window-title { color: #eee; }
        .controls-bar { width: 100px; }
        .icon-btn { background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1); border-radius: 5px; padding: 4px 8px; font-size: 12px; color: #333; cursor: pointer; outline: none; }
        body.dark-mode .icon-btn { background: rgba(255,255,255,0.1); color: #eee; border-color: #555; }
        .content { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .stats-bar { display: flex; justify-content: space-between; background: #f8f9fa; padding: 15px 25px; border-radius: 8px; border: 1px solid #e9ecef; }
        body.dark-mode .stats-bar { background: #252525; border-color: #333; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 11px; color: #6c757d; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .stat-value { font-size: 20px; font-weight: 700; color: var(--text-main); font-family: 'Courier New', monospace; }
        .clickable-stat { cursor: pointer; padding: 2px 8px; border-radius: 6px; transition: background 0.2s; }
        .clickable-stat:hover { background: #e9ecef; color: #339af0; }
        body.dark-mode .clickable-stat:hover { background: #333; }
        .typing-area { background: white; border: 2px solid #dee2e6; border-radius: 8px; padding: 25px; font-size: 36px; text-align: center; min-height: 80px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; position: relative; gap: 2px; }
        body.dark-mode .typing-area { background: #1a1a1a; border-color: #333; }
        .font-kruti { font-family: 'Kruti Dev 010', sans-serif !important; font-size: 40px; }
        .font-mangal { font-family: 'Mangal', sans-serif !important; font-size: 34px; }
        .font-en { font-family: Consolas, monospace !important; font-size: 36px; }
        .char { color: #adb5bd; transition: color 0.1s; white-space: pre; }
        body.dark-mode .char { color: #555; }
        .char.correct { color: #2b8a3e; font-weight: bold; }
        body.dark-mode .char.correct { color: #40c057; }
        .char.incorrect { color: #e03131; background-color: #ffe3e3; border-radius: 3px; }
        body.dark-mode .char.incorrect { color: #ff6b6b; background-color: rgba(224,49,49,0.2); }
        .char.active { color: #000; border-bottom: 4px solid #339af0; animation: blink 1s infinite; font-weight: bold;}
        body.dark-mode .char.active { color: #fff; }
        @keyframes blink { 50% { border-color: transparent; } }
        .lesson-info { text-align: center; color: #495057; font-size: 14px; font-weight: 600; }
        body.dark-mode .lesson-info { color: #bbb; }
        .keyboard { background: #e9ecef; padding: 20px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; }
        body.dark-mode .keyboard { background: #252525; }
        .kb-row { display: flex; justify-content: center; gap: 8px; }
        .key { background: white; border-radius: 6px; min-width: 46px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; color: var(--key-text); box-shadow: 0 2px 0 var(--key-shadow); }
        body.dark-mode .key { background: #333; }
        .key.wide-1 { min-width: 60px; } .key.wide-2 { min-width: 80px; } .key.wide-3 { min-width: 100px; } .key.space { min-width: 300px; }
        .key.pressed { transform: translateY(2px); box-shadow: 0 0 0 var(--key-shadow); background: rgba(0,0,0,0.1); }
        .key.target-key { border: 2px solid #339af0; background: #e7f5ff; transform: scale(1.05); z-index: 10; }
        body.dark-mode .key.target-key { background: #1864ab; border-color: #339af0; }
        .f-pl { background-color: var(--pinky-l); } .f-rl { background-color: var(--ring-l); } .f-ml { background-color: var(--mid-l); } .f-il { background-color: var(--index-l); } .f-t  { background-color: var(--thumb); } .f-ir character-r { background-color: var(--index-r); } .f-mr { background-color: var(--mid-r); } .f-rr { background-color: var(--ring-r); } .f-pr { background-color: var(--pinky-r); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-box { background: white; padding: 25px; border-radius: 10px; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-height: 80vh; overflow-y: auto; text-align: left; }
        body.dark-mode .modal-box { background: #2a2a2a; color: #eee; }
        .modal-box h3 { margin-top: 0; color: var(--text-main); font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .setting-group { margin: 15px 0; }
        .setting-group label { display: block; font-size: 13px; margin-bottom: 6px; font-weight: bold; }
        .setting-group select, .modal-box input[type="text"] { width: 100%; padding: 8px; font-size: 14px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;}
        .btn-save { background: #339af0; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 14px; font-weight: bold; }
        .lesson-item { padding: 10px; border: 1px solid #eee; margin-bottom: 6px; border-radius: 6px; cursor: pointer; }
        .lesson-item.active-lesson { background: #e7f5ff; border-color: #339af0; }
        .about-link { color: #339af0; text-decoration: none; font-weight: bold; }
        #toast-msg { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #2b8a3e; color: white; padding: 10px 20px; border-radius: 8px; z-index: 10000; display: none; font-size: 14px; }
    </style>
</head>
<body>
    <div id="toast-msg"></div>
    <div class="modal-overlay" id="login-modal" style="display: flex; z-index: 9999;">
        <div class="modal-box" style="text-align: center;">
            <h2 style="color: #339af0;">Welcome to Typing Pro</h2>
            <input type="text" id="username-input" placeholder="Enter your Name">
            <div id="login-msg" style="margin: 10px 0; font-size: 12px; color: #e85d04;"></div>
            <button class="btn-save" id="login-btn" onclick="window.loginUserAction()">Start Typing 🚀</button>
        </div>
    </div>
    <div class="modal-overlay" id="settings-modal"><div class="modal-box"><h3>Font & Layout</h3><div class="setting-group"><select id="layout-select"><option value="en">English (QWERTY)</option><option value="mangal">Hindi (Mangal)</option><option value="kruti">Hindi (Kruti Dev)</option></select></div><button class="btn-save" onclick="window.saveSettings()">Save & Apply</button></div></div>
    <div class="modal-overlay" id="about-modal"><div class="modal-box" style="text-align: center;"><h3>About</h3><p>Made with ❤️ by <strong>Sahil Vishwakarma</strong></p><p>GitHub: <a href="https://github.com/sahilvish" target="_blank" class="about-link">sahilvish</a></p><button class="btn-save" onclick="window.closeAboutModal()">Close</button></div></div>
    <div class="modal-overlay" id="alt-code-modal"><div class="modal-box"><h3>💡 Alt Codes</h3><table style="width:100%"><tr><td>ऋ</td><td>Alt + 0161</td></tr><tr><td>क्र</td><td>Alt + 0216</td></tr></table><button class="btn-save" onclick="window.closeAltCodeMenu()">Close</button></div></div>
    <div class="modal-overlay" id="lesson-modal"><div class="modal-box" style="width:500px"><h3>Select Lesson</h3><div id="lesson-menu-container"></div><button class="btn-save" onclick="window.closeLessonMenu()">Close</button></div></div>
    <div class="mac-window">
        <div class="title-bar">
            <div class="options-container" onclick="window.toggleOptionMenu()"><div class="options-text">Options</div><div class="traffic-lights"><div class="light red"></div><div class="light yellow"></div><div class="light green"></div></div></div>
            <div class="dropdown-menu" id="option-menu">
                <div class="menu-item"><label>Dark Mode</label><label class="switch"><input type="checkbox" id="dark-mode-toggle" onchange="window.toggleDarkMode()"><span class="slider"></span></label></div>
                <div class="menu-item menu-divider"><label>Font & Layout</label><button class="icon-btn" onclick="window.openSettings()">⚙️</button></div>
                <div class="menu-item menu-divider" id="alt-code-menu-item" style="display: none;"><label>Alt Codes</label><button class="icon-btn" onclick="window.openAltCodeMenu()">💡</button></div>
                <div class="menu-item menu-divider"><label>About</label><button class="icon-btn" onclick="window.openAboutModal()">ℹ️</button></div>
            </div>
            <div class="window-title" id="ui-title">Vyapam Typing Tutor Pro</div>
            <div class="controls-bar"></div>
        </div>
        <div class="content">
            <div class="stats-bar">
                <div class="stat-item"><div class="stat-label">User</div><div class="stat-value clickable-stat" onclick="window.switchUser()" id="display-username">-</div></div>
                <div class="stat-item"><div class="stat-label" id="label-lesson">Lesson</div><div class="stat-value clickable-stat dropdown-arrow" id="lesson-num" onclick="window.openLessonMenu()">1/1</div></div>
                <div class="stat-item"><div class="stat-label" id="label-wpm">WPM</div><div class="stat-value" id="wpm">0</div></div>
                <div class="stat-item"><div class="stat-label" id="label-accuracy">Accuracy</div><div class="stat-value" id="accuracy">100%</div></div>
            </div>
            <div class="lesson-info"><span id="layout-badge" class="test-badge">QWERTY</span><br><span id="instruction-text"></span></div>
            <div class="typing-area" id="typing-text"></div>
            <div class="keyboard" id="virtual-keyboard">
                <div class="kb-row"><div class="key f-pl" data-key="q">Q</div><div class="key f-rl" data-key="w">W</div><div class="key f-ml" data-key="e">E</div><div class="key f-il" data-key="r">R</div><div class="key f-il" data-key="t">T</div><div class="key f-ir" data-key="y">Y</div><div class="key f-ir" data-key="u">U</div><div class="key f-mr" data-key="i">I</div><div class="key f-rr" data-key="o">O</div><div class="key f-pr" data-key="p">P</div></div>
                <div class="kb-row"><div class="key f-pl" data-key="a">A</div><div class="key f-rl" data-key="s">S</div><div class="key f-ml" data-key="d">D</div><div class="key f-il" data-key="f">F</div><div class="key f-il" data-key="g">G</div><div class="key f-ir" data-key="h">H</div><div class="key f-ir" data-key="j">J</div><div class="key f-mr" data-key="k">K</div><div class="key f-rr" data-key="l">L</div><div class="key f-pr" data-key=";">;</div></div>
                <div class="kb-row"><div class="key f-pl" data-key="z">Z</div><div class="key f-rl" data-key="x">X</div><div class="key f-ml" data-key="c">C</div><div class="key f-il" data-key="v">V</div><div class="key f-il" data-key="b">B</div><div class="key f-ir" data-key="n">N</div><div class="key f-ir" data-key="m">M</div><div class="key f-mr" data-key=",">,</div><div class="key f-rr" data-key=".">.</div><div class="key f-pr" data-key="/">/</div></div>
                <div class="kb-row"><div class="key space f-t" data-key=" ">Space</div></div>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = 'typing-pro-sahil-vish'; let db = null, authUser = null;

        const krutiMap = { 'a':'ं','s':'े','d':'क','f':'ि','g':'ह','h':'ी','j':'र','k':'ा','l':'स',';':'य',"'":'श','q':'ु','w':'ू','e':'म','r':'त','t':'ज','y':'ल','u':'न','i':'प','o':'व','p':'च','[':'ख',']':',','z':'्र','x':'ग','c':'ब','v':'अ','b':'इ','n':'द','m':'उ',',':'ए','.':'ण्','/':'ध्','A':'ँ','S':'ै','D':'क्','F':'थ्','G':'ळ','H':'भ','J':'श्र','K':'ज्ञ','L':'स्',':':'रू','"':'ष्','Q':'फ','W':'ॅ','E':'म्','R':'त्','T':'ज्','Y':'ल्','U':'न्','I':'प्','O':'व्','P':'च्','{':'क्ष','}':'द्व','Z':'र्','X':'ग्','C':'ब्','V':'ट','B':'ठ','N':'छ','M':'ड','<':'ढ','>':'झ','?':'घ','~':'्','`':'़','1':'१','2':'२','3':'३','4':'४','5':'५','6':'६','7':'७','8':'८','9':'९','0':'०','-':'ृ','=':'ृ','\\':'?','|':'!','\xA1':'ऋ','\xD8':'क्र','\xAA':'ड़',' ':' ' };
        const mangalMap = { 'q':'ु','w':'ू','e':'म','r':'त','t':'ज','y':'ल','u':'न','i':'प','o':'व','p':'च','[':'ख',']':',','a':'ं','s':'े','d':'क','f':'ि','g':'ह','h':'ी','j':'र','k':'ा','l':'स',';':'य',"'":'श','z':'्र','x':'ग','c':'ब','v':'अ','b':'इ','n':'द','m':'उ',',':'ए','.':'ण्','/':'ध्',' ':' ' };

        const lessons = { 
            en: [{category:"🔰 Beginner", items:[{title:"Home Row", text:"asdf jkl; asdf jkl; fdsa ;lkj", inst:"Index fingers on F and J."},{title:"Drills", text:"frf juj dcd kik sws lol aqa ;p;", inst:"Practice reaching above/below home row."}]}], 
            kruti: [{category:"🔰 Beginner", items:[{title:"Home Row Anchor", text:"gkgk gkgk kkg gggk", inst:"G (ह) aur K (ा) par rakhein."},{title:"Middle Row", text:"asdf jkl; asdf jkl;", inst:"A(ं), S(े), D(क), F(ि), J(र), K(ा), L(स), ;(य)."}]}], 
            mangal: [{category:"🔰 Beginner", items:[{title:"Home Row", text:"ंेकि रासय िकें यसार", inst:"A(ं) S(े) D(क) F(ि) | J(र) K(ा) L(स) ;(य)."}]}] 
        };

        let layout = 'en', charIdx = 0, mistakes = 0, startTime = null, isActive = false, currentLessonIdx = 0, profile = { username: '', layout: 'en', progress: { en: 0, kruti: 0, mangal: 0 } }, flatLessons = [];
        const area = document.getElementById('typing-text'), inst = document.getElementById('instruction-text'), lNum = document.getElementById('lesson-num'), wpmD = document.getElementById('wpm'), accD = document.getElementById('accuracy');

        window.loginUserAction = async () => {
            const u = document.getElementById('username-input').value.trim(); if(!u) return;
            document.getElementById('login-btn').disabled = true;
            if(db && authUser){
                const snap = await getDoc(doc(db,'artifacts',appId,'users',authUser.uid,'profiles',u.toLowerCase()));
                if(snap.exists()) { profile = snap.data(); showToast(`Welcome back, ${profile.username}!`); }
                else { profile = {username: u, layout:'en', progress:{en:0, kruti:0, mangal:0}}; await setDoc(doc(db,'artifacts',appId,'users',authUser.uid,'profiles',u.toLowerCase()), profile); showToast("Profile created!"); }
            } else { profile = {username: u, layout:'en', progress:{en:0, kruti:0, mangal:0}}; }
            document.getElementById('login-modal').style.display='none'; document.getElementById('display-username').innerText = profile.username;
            layout = profile.layout || 'en'; document.getElementById('layout-select').value = layout; apply(); load(profile.progress[layout] || 0);
        };

        window.saveSettings = () => { layout = document.getElementById('layout-select').value; profile.layout = layout; document.getElementById('settings-modal').style.display='none'; save(); apply(); load(profile.progress[layout] || 0); };
        window.toggleOptionMenu = () => document.getElementById('option-menu').classList.toggle('show');
        window.openSettings = () => { window.toggleOptionMenu(); document.getElementById('settings-modal').style.display = 'flex'; };
        window.openAboutModal = () => { window.toggleOptionMenu(); document.getElementById('about-modal').style.display = 'flex'; };
        window.closeAboutModal = () => document.getElementById('about-modal').style.display = 'none';
        window.openAltCodeMenu = () => { window.toggleOptionMenu(); document.getElementById('alt-code-modal').style.display = 'flex'; };
        window.closeAltCodeMenu = () => document.getElementById('alt-code-modal').style.display = 'none';
        window.closeLessonMenu = () => document.getElementById('lesson-modal').style.display = 'none';
        window.toggleDarkMode = () => document.body.classList.toggle('dark-mode', document.getElementById('dark-mode-toggle').checked);
        window.switchUser = () => { document.getElementById('username-input').value=''; document.getElementById('login-modal').style.display='flex'; };
        window.openLessonMenu = () => {
            const cont = document.getElementById('lesson-menu-container'); cont.innerHTML = ''; let counter = 0;
            lessons[layout].forEach(g => {
                const d = document.createElement('div'); d.innerHTML = `<div class="lesson-category-title">${g.category}</div>`; const ul = document.createElement('ul'); ul.className='lesson-list';
                g.items.forEach(l => { const idx = counter; const li = document.createElement('li'); li.className = `lesson-item ${idx === currentLessonIdx ? 'active-lesson' : ''}`; li.onclick = () => { window.closeLessonMenu(); load(idx); }; li.innerHTML = l.title; ul.appendChild(li); counter++; });
                d.appendChild(ul); cont.appendChild(d);
            });
            document.getElementById('lesson-modal').style.display='flex';
        };

        function showToast(m) { const t = document.getElementById('toast-msg'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
        async function save() { if(db && authUser && profile.username) await setDoc(doc(db,'artifacts',appId,'users',authUser.uid,'profiles',profile.username.toLowerCase()), profile, {merge:true}); }
        function apply() {
            document.getElementById('alt-code-menu-item').style.display = layout==='kruti'?'flex':'none'; area.classList.remove('font-kruti','font-mangal','font-en'); area.classList.add(`font-${layout}`);
            document.getElementById('layout-badge').innerText = layout==='en'?'QWERTY English':(layout==='kruti'?'Kruti Dev 010':'Mangal Remington');
            const title = document.getElementById('ui-title'), isEn = layout === 'en'; title.innerText = isEn ? "Vyapam Typing Tutor Pro" : "व्यापम टाइपिंग ट्यूटर प्रो";
            document.getElementById('label-lesson').innerText = isEn ? "Lesson" : "पाठ"; document.getElementById('label-wpm').innerText = isEn ? "WPM" : "गति"; document.getElementById('label-accuracy').innerText = isEn ? "Accuracy" : "सटीकता";
            flatLessons = []; lessons[layout].forEach(g => g.items.forEach(l => flatLessons.push(l)));
        }
        function load(idx) {
            currentLessonIdx = idx; const l = flatLessons[idx]; charIdx = 0; mistakes = 0; startTime = null; isActive = true;
            lNum.innerHTML = `${idx+1}/${flatLessons.length}`; inst.innerText = l.inst; wpmD.innerText='0'; accD.innerText='100%'; area.innerHTML='';
            l.text.split('').forEach((c,i) => { const s = document.createElement('span'); let v = c; if(layout==='kruti') v = krutiMap[c]||c; s.textContent = v; s.className='char'; if(i===0) s.classList.add('active'); area.appendChild(s); });
            highlight();
        }
        function highlight() {
            document.querySelectorAll('.target-key').forEach(k => k.classList.remove('target-key')); if(charIdx < flatLessons[currentLessonIdx].text.length) {
                let pk = flatLessons[currentLessonIdx].text[charIdx].toLowerCase(); if(layout==='mangal') { for(let [k,v] of Object.entries(remingtonMap)) if(v===flatLessons[currentLessonIdx].text[charIdx]) {pk=k; break;} }
                const el = document.querySelector(`.key[data-key="${pk}"]`); if(el) el.classList.add('target-key');
            }
        }
        window.addEventListener('keydown', (e) => {
            if(['Shift','Control','Alt','Meta','CapsLock','Tab'].includes(e.key)) return; if(['settings-modal','lesson-modal','alt-code-modal','login-modal','about-modal'].some(id=>document.getElementById(id).style.display==='flex')) return;
            if(!isActive) return; if(!startTime) startTime = new Date(); const pk = e.key.toLowerCase(); const pKey = document.querySelector(`.key[data-key="${pk}"]`); if(pKey){ pKey.classList.add('pressed'); setTimeout(()=>pKey.classList.remove('pressed'),100); }
            if(charIdx < flatLessons[currentLessonIdx].text.length) {
                const spans = area.querySelectorAll('.char'), target = flatLessons[currentLessonIdx].text[charIdx];
                if(e.key==='Backspace'){ if(charIdx > 0){ spans[charIdx].classList.remove('active'); charIdx--; spans[charIdx].classList.remove('correct','incorrect'); spans[charIdx].classList.add('active'); highlight(); } return; }
                let typed = pk; if(layout==='kruti') typed = e.key; else if(layout==='mangal') typed = mangalMap[pk]||pk;
                if(typed===target || (target===' ' && e.key===' ')){ spans[charIdx].classList.remove('active'); spans[charIdx].classList.add('correct'); charIdx++; }
                else { spans[charIdx].classList.remove('active'); spans[charIdx].classList.add('incorrect'); mistakes++; charIdx++; }
                if(charIdx < flatLessons[currentLessonIdx].text.length){ spans[charIdx].classList.add('active'); highlight(); } else { isActive=false; let next = currentLessonIdx+1; if(next > (profile.progress[layout]||0)) { profile.progress[layout] = next; save(); } if(next >= flatLessons.length) { showToast("🎉 Congratulations!"); next = 0; } else { showToast(`Lesson Complete!`); } setTimeout(()=>load(next),1500); }
                if(startTime && charIdx > 0) { const total = charIdx; accD.innerText = `${Math.max(0, Math.floor(((total-mistakes)/total)*100))}%`; const wpm = Math.floor((total/5)/((new Date()-startTime)/60000)); wpmD.innerText = isFinite(wpm)?wpm:0; }
            }
        });
        (async function(){ try { const cfg = typeof __firebase_config!=='undefined'?JSON.parse(__firebase_config):null; if(cfg){ const a = initializeApp(cfg); const auth = getAuth(a); db = getFirestore(a); await signInAnonymously(auth); onAuthStateChanged(auth, u => authUser=u); } } catch(e){} })();
        window.addEventListener('click', (e) => { const m = document.getElementById('option-menu'), c = document.querySelector('.options-container'); if(m && c && !m.contains(e.target) && !c.contains(e.target)) m.classList.remove('show'); });
    </script>
</body>
</html>
